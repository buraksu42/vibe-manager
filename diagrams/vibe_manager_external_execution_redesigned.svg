<svg width="100%" viewBox="0 0 698.02 720" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">vibe-manager external execution loop</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">What the user does after manager finishes. First steps run once: run setup command, open Claude Code which auto-loads CLAUDE.md. Then a per-phase loop repeats. Each phase reads agents.md or the Work plan, optionally produces visual assets via Claude Design, executes sub-agents (Architect, Backend, Frontend, Reviewer), passes the verification gate of lint, tsc, and tests, commits and pushes to the test or prod branch, then loops back for the next phase. The dashed return arrow on the right indicates the loop.</desc>
